<div id="signupPopup" class="popup" style="display: none;">
	<div class="card text-center">
	  <div class="card-body">
		<a href="#" class="close">&times;</a> <!-- This link closes the popup -->
		<form id="signupForm" action="#" method="POST">
		  <div class="form-group">
			<label for="EmailField">Email address</label>
			<input type="email" class="form-control" id="EmailField" aria-describedby="emailHelp" placeholder="Enter email" required>
		  </div>
		  <div class="form-group">
			<label for="PasswordField">Password</label>
			<input type="password" class="form-control" id="PasswordField" placeholder="Password" required>
		  </div>
		  <div class="form-group">
			<label for="RepeatPasswordField">Repeat Password</label>
			<input type="password" class="form-control" id="RepeatPasswordField" placeholder="Repeat Password" required>
		  </div>
		  <div class="form-check">
			<input type="checkbox" class="form-check-input" id="exampleCheck1">
			<label class="form-check-label" for="exampleCheck1">Remember me</label>
		  </div>
		  <button type="submit" class="btn btn-info">Submit</button>
		</form>
		<p class="mt-3">
		  Already registered? <a href="#loginPopup" id="loginLink">Go to login.</a> <!-- Link to the login popup -->
		</p>
	  </div>
	</div>
  </div>
